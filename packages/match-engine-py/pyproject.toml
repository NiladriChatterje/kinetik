[project]
name = "kinetik-match-engine"
version = "0.1.0"
description = "Kinetik match engine — NCF-based neural collaborative filtering with CUDA acceleration"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "celery>=5.4.0",
    "redis>=5.2.0",
    "aiokafka>=0.11.0",
    "asyncpg>=0.30.0",
    "h3>=4.1.0",
    "numpy>=1.26.0",
    "scikit-learn>=1.5.0",
    "torch>=2.4.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
]

[build-system]
requires = ["setuptools>=74.0.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
