worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ─── MIME types ───────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ──────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ──────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ─── Timeouts ─────────────────────────────────────────
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ─── Buffer sizes ─────────────────────────────────────
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # ─── Gzip ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # ─── Rate limiting ────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # ─── WebSocket upgrade map ────────────────────────────
    # Required for the $connection_upgrade variable used in Socket.IO proxy
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─── Main server ──────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow large file uploads (profile photos)
        client_max_body_size 10M;

        # ─── Socket.IO → realtime ────────────────────────
        # Socket.IO uses HTTP long-polling + WebSocket upgrade on /socket.io/
        location /socket.io/ {
            proxy_pass http://realtime:3002;
            proxy_http_version 1.1;

            # WebSocket upgrade (Socket.IO upgrades from polling to WS)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long-lived connections (Socket.IO heartbeat ~25s)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Disable buffering for real-time
            proxy_buffering off;
        }

        # ─── Auth routes → api-core (stricter rate limit) ─
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass http://api-core:3001;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ─── All other API routes → api-core ──────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://api-core:3001;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ─── Uploaded photos → MinIO (proxy, not redirect) ─
        location /uploads/ {
            # Bucket name must match MINIO_BUCKET env var (default: kinetik-photos)
            proxy_pass http://minio:9000/kinetik-photos/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache photos aggressively (they're immutable)
            expires 1y;
            add_header Cache-Control "public, immutable";

            # Allow hotlinking from the app
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ─── Health check ─────────────────────────────────
        location = /health {
            proxy_pass http://api-core:3001/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ─── Default: 404 ────────────────────────────────
        location / {
            return 404 '{"success":false,"error":{"code":"NOT_FOUND","message":"Route not found"}}';
            add_header Content-Type application/json always;
        }
    }
}
