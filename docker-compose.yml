x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kinetik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kinetik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kinetik_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-kinetik}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 384M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kinetik} -d ${POSTGRES_DB:-kinetik}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─── Redis Cluster (Single Node for Dev) ─────────────────
  redis:
    image: redis:7-alpine
    container_name: kinetik-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-kinetik_redis_2024} --maxmemory 384mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─── Apache Kafka ────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: kinetik-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    logging: *default-logging

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kinetik-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_BYTES: 536870912
      KAFKA_MESSAGE_MAX_BYTES: 1048576
      KAFKA_HEAP_OPTS: "-Xmx192M -Xms96M"
    volumes:
      - kafka-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 384M
        reservations:
          memory: 256M
    logging: *default-logging

  # ─── Kafka Topic Init (runs once on startup) ──────────────
  kafka-init:
    image: node:20-alpine
    container_name: kinetik-kafka-init
    restart: "no"
    environment:
      KAFKA_BROKERS: kafka:29092
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        cd /scripts
        echo "📦 Installing dependencies..."
        npm init -y > /dev/null 2>&1
        npm install kafkajs tsx > /dev/null 2>&1
        echo "⏳ Creating Kafka topics..."
        for i in $$(seq 1 10); do
          npx tsx kafkaAdmin.ts && echo "✅ Kafka topics ready" && exit 0
          echo "⚠️  Attempt $$i/10 failed, retrying in 5s..."
          sleep 5
        done
        echo "❌ Failed to create Kafka topics after 10 attempts"
        exit 1
    volumes:
      - ./scripts:/scripts
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 128M
    depends_on:
      kafka:
        condition: service_started
    logging: *default-logging

  # ─── LiveKit WebRTC SFU ──────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    container_name: kinetik-livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
      - "3478:3478/udp"
      - "3479:3479/tcp"
    volumes:
      - ./config/livekit.yaml:/etc/livekit.yaml
    command: ["--config", "/etc/livekit.yaml"]
    environment:
      LIVEKIT_LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    logging: *default-logging

  # ─── Core API Service ────────────────────────────────────
  api-core:
    build:
      context: .
      dockerfile: packages/api-core/Dockerfile
    container_name: kinetik-api-core
    restart: unless-stopped
    ports:
      - "${API_CORE_PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-kinetik}:${POSTGRES_PASSWORD:-kinetik_dev_2024}@postgres:5432/${POSTGRES_DB:-kinetik}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-kinetik_redis_2024}
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production-2024}
      JWT_EXPIRES_IN: 7d
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_xxxxxxxxxxxx}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-your_razorpay_secret}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    logging: *default-logging

  # ─── Real-Time WebSocket Service ─────────────────────────
  realtime:
    build:
      context: .
      dockerfile: packages/realtime/Dockerfile
    container_name: kinetik-realtime
    restart: unless-stopped
    ports:
      - "${REALTIME_PORT:-3002}:3002"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3002
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-kinetik_redis_2024}
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production-2024}
      LIVEKIT_HOST: livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-kinetik_livekit_key}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-kinetik_livekit_secret_2024_dev_xyz}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      livekit:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    logging: *default-logging

  # ─── MinIO Object Storage (S3-compatible) ──────────────
  minio:
    image: minio/minio:latest
    container_name: kinetik-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    logging: *default-logging

  # ─── MinIO Bucket Setup (runs once on startup) ──────────
  minio-init:
    image: minio/mc:latest
    container_name: kinetik-minio-init
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "⏳ Waiting for MinIO..."
        until mc alias set kinetik http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin}; do
          echo "⚠️  Retrying in 3s..."
          sleep 3
        done
        echo "✅ Connected to MinIO"
        if mc ls kinetik/${MINIO_BUCKET:-kinetik-photos} > /dev/null 2>&1; then
          echo "✅ Bucket already exists"
        else
          mc mb kinetik/${MINIO_BUCKET:-kinetik-photos}
          echo "✅ Created bucket: ${MINIO_BUCKET:-kinetik-photos}"
        fi
        # Make bucket publicly readable (for direct URL access via nginx)
        mc anonymous set download kinetik/${MINIO_BUCKET:-kinetik-photos}
        echo "✅ Bucket policy set to public-read"
    depends_on:
      minio:
        condition: service_started
    logging: *default-logging

  # ─── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: kinetik-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-core
      - realtime
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
        reservations:
          memory: 32M
    logging: *default-logging

  # ─── Match Engine (Python / NCF + CUDA) ───────────────────
  match-engine:
    build:
      context: packages/match-engine-py
      dockerfile: Dockerfile
    container_name: kinetik-match-engine
    restart: unless-stopped
    ports:
      - "${MATCH_ENGINE_PORT:-3003}:3003"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PORT: 3003
      HOST: "0.0.0.0"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-kinetik_redis_2024}
      KAFKA_BROKERS: kafka:29092
      DATABASE_URL: postgresql://${POSTGRES_USER:-kinetik}:${POSTGRES_PASSWORD:-kinetik_dev_2024}@postgres:5432/${POSTGRES_DB:-kinetik}
      FORCE_CPU: ${FORCE_CPU:-false}        # Set to "true" to disable CUDA
      NCF_MODEL_PATH: /data/models/ncf.pt
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - match-engine-models:/data/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          memory: 512M
    logging: *default-logging

  # ─── Match Engine Celery Worker (parallel job processing) ──
  match-engine-worker:
    build:
      context: packages/match-engine-py
      dockerfile: Dockerfile
    container_name: kinetik-match-engine-worker
    restart: unless-stopped
    entrypoint: ["/bin/bash", "entrypoint-celery.sh"]
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-kinetik_redis_2024}
      KAFKA_BROKERS: kafka:29092
      DATABASE_URL: postgresql://${POSTGRES_USER:-kinetik}:${POSTGRES_PASSWORD:-kinetik_dev_2024}@postgres:5432/${POSTGRES_DB:-kinetik}
      FORCE_CPU: ${FORCE_CPU:-false}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-2}
      CELERY_LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
      match-engine:
        condition: service_started
    volumes:
      - match-engine-models:/data/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 512M
    logging: *default-logging

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  match-engine-models:
  minio-data:

